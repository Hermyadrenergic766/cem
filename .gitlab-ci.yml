# GitLab CI for CEM
# Canonical repo: http://gitlab.makdos.biz/makdos/cem.git
#
# Aşamalar:
#  1. test     — her push'ta `go test ./...`
#  2. release  — sadece `v*` tag push'unda 7 platform binary üretir,
#                gitlab release oluşturur ve cem.pw indirme proxy'sine
#                upload-artifact API ile koyar.

stages:
  - test
  - build
  - release

variables:
  GO_VERSION: "1.25"
  CGO_ENABLED: "0"

default:
  image: golang:${GO_VERSION}-bookworm
  cache:
    key: gomod-${GO_VERSION}
    paths:
      - .gocache/
      - .gomod/
  before_script:
    - export GOPATH="$CI_PROJECT_DIR/.gomod"
    - export GOCACHE="$CI_PROJECT_DIR/.gocache"
    - go env -w GOFLAGS=-mod=mod

# ─── Test ────────────────────────────────────────────────────────────────────

test:
  stage: test
  script:
    - go mod download
    - go vet ./...
    - go test -v ./...
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ─── Build (matrix) ──────────────────────────────────────────────────────────

.build-template: &build-template
  stage: build
  script:
    - mkdir -p dist
    - VERSION="${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}"
    - LDFLAGS="-s -w -X main.version=${VERSION}"
    - SUFFIX="-${GOOS}-${GOARCH}${EXT:-}"
    - |
      for name in cem cemi cemir; do
        out="dist/${name}${SUFFIX}"
        echo "→ $out  (version=$VERSION)"
        go build -trimpath -ldflags="$LDFLAGS" -o "$out" .
      done
    - ls -la dist/
  artifacts:
    name: "cem-${GOOS}-${GOARCH}"
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

build:linux-amd64:
  <<: *build-template
  variables: { GOOS: linux,   GOARCH: amd64 }

build:linux-arm64:
  <<: *build-template
  variables: { GOOS: linux,   GOARCH: arm64 }

build:linux-arm:
  <<: *build-template
  variables: { GOOS: linux,   GOARCH: arm, GOARM: "7" }

build:darwin-amd64:
  <<: *build-template
  variables: { GOOS: darwin,  GOARCH: amd64 }

build:darwin-arm64:
  <<: *build-template
  variables: { GOOS: darwin,  GOARCH: arm64 }

build:windows-amd64:
  <<: *build-template
  variables: { GOOS: windows, GOARCH: amd64, EXT: ".exe" }

build:windows-arm64:
  <<: *build-template
  variables: { GOOS: windows, GOARCH: arm64, EXT: ".exe" }

# ─── Release ─────────────────────────────────────────────────────────────────

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build:linux-amd64
    - build:linux-arm64
    - build:linux-arm
    - build:darwin-amd64
    - build:darwin-arm64
    - build:windows-amd64
    - build:windows-arm64
  script:
    - echo "Releasing $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "CEM $CI_COMMIT_TAG"
    description: "Auto-generated release for $CI_COMMIT_TAG"
    assets:
      links:
        - name: "linux-amd64"
          url:  "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cem-linux-amd64?job=build:linux-amd64"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
