# GitLab CI for CEM
# Canonical repo: http://gitlab.makdos.biz/makdos/cem.git
#
# Aşamalar:
#  1. test     — her push'ta `go test ./...`
#  2. release  — sadece `v*` tag push'unda 7 platform binary üretir,
#                gitlab release oluşturur ve cem.pw indirme proxy'sine
#                upload-artifact API ile koyar.

stages:
  - test
  - build
  - release

variables:
  GO_VERSION: "1.25"
  CGO_ENABLED: "0"

default:
  image: golang:${GO_VERSION}-bookworm
  cache:
    key: gomod-${GO_VERSION}
    paths:
      - .gocache/
      - .gomod/
  before_script:
    - export GOPATH="$CI_PROJECT_DIR/.gomod"
    - export GOCACHE="$CI_PROJECT_DIR/.gocache"
    - go env -w GOFLAGS=-mod=mod

# ─── Test ────────────────────────────────────────────────────────────────────

test:
  stage: test
  script:
    - go mod download
    - go vet ./...
    - go test -v ./...
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ─── Build (matrix) ──────────────────────────────────────────────────────────

.build-template: &build-template
  stage: build
  script:
    - mkdir -p dist
    - VERSION="${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}"
    - LDFLAGS="-s -w -X main.version=${VERSION}"
    - SUFFIX="-${GOOS}-${GOARCH}${EXT:-}"
    - |
      for name in cem cemi cemir; do
        out="dist/${name}${SUFFIX}"
        echo "→ $out  (version=$VERSION)"
        go build -trimpath -ldflags="$LDFLAGS" -o "$out" .
      done
    - ls -la dist/
  artifacts:
    name: "cem-${GOOS}-${GOARCH}"
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

build:linux-amd64:
  <<: *build-template
  variables: { GOOS: linux,   GOARCH: amd64 }

build:linux-arm64:
  <<: *build-template
  variables: { GOOS: linux,   GOARCH: arm64 }

build:linux-arm:
  <<: *build-template
  variables: { GOOS: linux,   GOARCH: arm, GOARM: "7" }

build:darwin-amd64:
  <<: *build-template
  variables: { GOOS: darwin,  GOARCH: amd64 }

build:darwin-arm64:
  <<: *build-template
  variables: { GOOS: darwin,  GOARCH: arm64 }

build:windows-amd64:
  <<: *build-template
  variables: { GOOS: windows, GOARCH: amd64, EXT: ".exe" }

build:windows-arm64:
  <<: *build-template
  variables: { GOOS: windows, GOARCH: arm64, EXT: ".exe" }

# ─── Release ─────────────────────────────────────────────────────────────────

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - { job: "build:linux-amd64",   artifacts: true }
    - { job: "build:linux-arm64",   artifacts: true }
    - { job: "build:linux-arm",     artifacts: true }
    - { job: "build:darwin-amd64",  artifacts: true }
    - { job: "build:darwin-arm64",  artifacts: true }
    - { job: "build:windows-amd64", artifacts: true }
    - { job: "build:windows-arm64", artifacts: true }
  script:
    - ls -la dist/
    - cd dist && sha256sum * > SHA256SUMS.txt
    - cat SHA256SUMS.txt
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "CEM $CI_COMMIT_TAG"
    description: |
      Auto-generated release for $CI_COMMIT_TAG.

      Kurulum:
      ```
      curl -fsSL cem.pw/install | sh
      ```

      install.sh `cem.pw/r/<file>` proxy'sini kullanır; o da bu release'in
      `permalink/latest/downloads/` yoluna düşer.
    assets:
      links:
        # Linux
        - { name: "cem-linux-amd64",   url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cem-linux-amd64?job=build:linux-amd64",     link_type: "package" }
        - { name: "cemi-linux-amd64",  url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemi-linux-amd64?job=build:linux-amd64",    link_type: "package" }
        - { name: "cemir-linux-amd64", url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemir-linux-amd64?job=build:linux-amd64",   link_type: "package" }
        - { name: "cem-linux-arm64",   url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cem-linux-arm64?job=build:linux-arm64",     link_type: "package" }
        - { name: "cemi-linux-arm64",  url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemi-linux-arm64?job=build:linux-arm64",    link_type: "package" }
        - { name: "cemir-linux-arm64", url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemir-linux-arm64?job=build:linux-arm64",   link_type: "package" }
        - { name: "cem-linux-arm",     url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cem-linux-arm?job=build:linux-arm",         link_type: "package" }
        - { name: "cemi-linux-arm",    url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemi-linux-arm?job=build:linux-arm",        link_type: "package" }
        - { name: "cemir-linux-arm",   url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemir-linux-arm?job=build:linux-arm",       link_type: "package" }
        # macOS
        - { name: "cem-darwin-amd64",   url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cem-darwin-amd64?job=build:darwin-amd64",    link_type: "package" }
        - { name: "cemi-darwin-amd64",  url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemi-darwin-amd64?job=build:darwin-amd64",   link_type: "package" }
        - { name: "cemir-darwin-amd64", url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemir-darwin-amd64?job=build:darwin-amd64",  link_type: "package" }
        - { name: "cem-darwin-arm64",   url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cem-darwin-arm64?job=build:darwin-arm64",    link_type: "package" }
        - { name: "cemi-darwin-arm64",  url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemi-darwin-arm64?job=build:darwin-arm64",   link_type: "package" }
        - { name: "cemir-darwin-arm64", url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemir-darwin-arm64?job=build:darwin-arm64",  link_type: "package" }
        # Windows
        - { name: "cem-windows-amd64.exe",   url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cem-windows-amd64.exe?job=build:windows-amd64",     link_type: "package" }
        - { name: "cemi-windows-amd64.exe",  url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemi-windows-amd64.exe?job=build:windows-amd64",    link_type: "package" }
        - { name: "cemir-windows-amd64.exe", url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemir-windows-amd64.exe?job=build:windows-amd64",   link_type: "package" }
        - { name: "cem-windows-arm64.exe",   url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cem-windows-arm64.exe?job=build:windows-arm64",     link_type: "package" }
        - { name: "cemi-windows-arm64.exe",  url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemi-windows-arm64.exe?job=build:windows-arm64",    link_type: "package" }
        - { name: "cemir-windows-arm64.exe", url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/cemir-windows-arm64.exe?job=build:windows-arm64",   link_type: "package" }
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
