name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,   arch: amd64, ext: "" }
          - { os: linux,   arch: arm64, ext: "" }
          - { os: linux,   arch: arm,   ext: "" }
          - { os: darwin,  arch: amd64, ext: "" }
          - { os: darwin,  arch: arm64, ext: "" }
          - { os: windows, arch: amd64, ext: ".exe" }
          - { os: windows, arch: arm64, ext: ".exe" }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build cem / cemi / cemir
        env:
          GOOS:   ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          SUFFIX="-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          VERSION="${GITHUB_REF_NAME:-dev}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          for name in cem cemi cemir; do
            out="dist/${name}${SUFFIX}"
            echo "→ $out  (version=$VERSION)"
            go build -trimpath -ldflags="$LDFLAGS" -o "$out" .
          done

      - uses: actions/upload-artifact@v4
        with:
          name: cem-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*

  build-intellij-plugin:
    name: IntelliJ plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Sync pluginVersion to tag
        working-directory: plugin/intellij
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^pluginVersion = .*/pluginVersion = ${VERSION}/" gradle.properties
          grep pluginVersion gradle.properties

      - name: Build plugin
        working-directory: plugin/intellij
        run: gradle buildPlugin --no-daemon --warning-mode all

      - name: Rename to versioned filename
        working-directory: plugin/intellij/build/distributions
        run: |
          ls -la
          for f in *.zip; do
            mv "$f" "cem-intellij-${GITHUB_REF_NAME}.zip"
          done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: cem-intellij-plugin
          path: plugin/intellij/build/distributions/*.zip

  release:
    needs: [build, build-intellij-plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
