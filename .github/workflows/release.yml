name: Release

on:
  push:
    tags:
      - 'v*.*.*'        # legacy semver: v0.1.x
      - '20[0-9][0-9][0-9][0-9][0-9][0-9].*'  # calendar: YYYYMMDD.MINOR (örn. 20260525.01)

permissions:
  contents: write

# Actions runner'larının Node 20 → 24 geçişi (Eylül 2026'ya kadar opt-in).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,   arch: amd64, ext: "" }
          - { os: linux,   arch: arm64, ext: "" }
          - { os: linux,   arch: arm,   ext: "" }
          - { os: darwin,  arch: amd64, ext: "" }
          - { os: darwin,  arch: arm64, ext: "" }
          - { os: windows, arch: amd64, ext: ".exe" }
          - { os: windows, arch: arm64, ext: ".exe" }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build cem / cemi / cemir
        env:
          GOOS:   ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          SUFFIX="-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          VERSION="${GITHUB_REF_NAME:-dev}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          for name in cem cemi cemir; do
            out="dist/${name}${SUFFIX}"
            echo "→ $out  (version=$VERSION)"
            go build -trimpath -ldflags="$LDFLAGS" -o "$out" .
          done

      - uses: actions/upload-artifact@v4
        with:
          name: cem-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*

  build-intellij-plugin:
    name: IntelliJ plugin
    runs-on: ubuntu-latest
    continue-on-error: true   # don't block binary release if plugin build fails
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4
        # Default Gradle (9.x). IntelliJ Platform Gradle Plugin 2.16+ Gradle 9.0+
        # gerektiriyor. Deprecation uyarıları olabilir, build başarısız olmaz.

      - name: Sync pluginVersion to tag
        working-directory: plugin/intellij
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^pluginVersion = .*/pluginVersion = ${VERSION}/" gradle.properties
          grep pluginVersion gradle.properties

      - name: Build plugin
        working-directory: plugin/intellij
        run: gradle buildPlugin --no-daemon --warning-mode all

      - name: Rename to versioned filename (if needed)
        working-directory: plugin/intellij/build/distributions
        run: |
          ls -la
          TARGET="cem-intellij-${GITHUB_REF_NAME}.zip"
          for f in *.zip; do
            if [ "$f" != "$TARGET" ]; then
              mv "$f" "$TARGET"
            fi
          done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: cem-intellij-plugin
          path: plugin/intellij/build/distributions/*.zip

  build-vscode-extension:
    name: VS Code extension
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync version to tag
        working-directory: plugin/vscode
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "let p=require('./package.json');p.version='${VERSION}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2));"
          grep version package.json | head

      - name: Install deps + package
        working-directory: plugin/vscode
        run: |
          npm install --no-audit --no-fund --no-package-lock
          npx vsce package --no-dependencies --out cem-vscode-${GITHUB_REF_NAME}.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: cem-vscode-extension
          path: plugin/vscode/*.vsix

  build-mcp-server:
    name: MCP server (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,   arch: amd64, ext: "" }
          - { os: linux,   arch: arm64, ext: "" }
          - { os: darwin,  arch: amd64, ext: "" }
          - { os: darwin,  arch: arm64, ext: "" }
          - { os: windows, arch: amd64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build cem-mcp
        working-directory: plugin/mcp
        env:
          GOOS:   ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          OUT="dist/cem-mcp-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "$OUT" .
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: cem-mcp-${{ matrix.os }}-${{ matrix.arch }}
          path: plugin/mcp/dist/*

  release:
    needs: build              # plugin is best-effort; binaries always ship
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
