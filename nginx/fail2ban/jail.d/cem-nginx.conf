##############################################################################
# /etc/fail2ban/jail.d/cem-nginx.conf
# Fail2ban — Nginx Log Tabanlı Otomatik Banlama
#
# Kurulum:
#   apt install fail2ban
#   cp bu-dosya /etc/fail2ban/jail.d/cem-nginx.conf
#   cp filter dosyaları /etc/fail2ban/filter.d/
#   systemctl restart fail2ban
##############################################################################

[DEFAULT]
bantime  = 1h
findtime = 10m
maxretry = 5
banaction = iptables-multiport
action    = %(action_mwl)s    # Ban + email + log

##############################################################################
# Rate limit aşımı — 429 dönen IP'leri ban
##############################################################################
[nginx-limit-req]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/cem.pw.access.log
filter   = nginx-limit-req
maxretry = 10
findtime = 5m
bantime  = 30m

##############################################################################
# 400/444 hataları — kötü istek gönderenleri ban
##############################################################################
[nginx-bad-request]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/cem.pw.access.log
filter   = nginx-bad-request
maxretry = 20
findtime = 5m
bantime  = 1h

##############################################################################
# 404 fırtınası — path tarayıcıları (DirBuster, Nikto vb.)
##############################################################################
[nginx-404-flood]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/cem.pw.access.log
filter   = nginx-404-flood
maxretry = 30
findtime = 1m
bantime  = 2h

##############################################################################
# SSH brute-force (sunucu geneli)
##############################################################################
[sshd]
enabled  = true
port     = ssh
logpath  = %(sshd_log)s
maxretry = 3
findtime = 5m
bantime  = 24h

##############################################################################
# Download flood — install script'i sürekli çekmeye çalışanlar
##############################################################################
[nginx-download-flood]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/cem.pw.downloads.log
filter   = nginx-download-flood
maxretry = 20
findtime = 1m
bantime  = 6h
