##############################################################################
# /etc/nginx/sites-available/cem.pw.conf
#
# Rotalar:
#   cem.pw/install       → install.sh  (curl ile çekilir)
#   cem.pw/install.ps1   → install.ps1 (Windows PowerShell)
#   cem.pw/uninstall     → uninstall.sh (macOS & Linux)
#   cem.pw/uninstall.ps1 → uninstall.ps1 (Windows PowerShell)
#   cem.pw/              → docs sitesi (static)
#   cem.pw/docs/*        → docs sitesi
#   cem.pw/r/*           → GitLab Releases proxy (binary indirme)
#
# Kurulum:
#   ln -s /etc/nginx/sites-available/cem.pw.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
##############################################################################

##############################################################################
# www → apex yönlendirme
##############################################################################
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cem.pw;

    include /etc/nginx/snippets/ssl.conf;

    return 301 https://cem.pw$request_uri;
}

##############################################################################
# ANA SUNUCU — cem.pw
##############################################################################
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cem.pw;

    root /var/www/cem.pw/public;
    index index.html;

    # ── SSL ──────────────────────────────────────────────────────────────────
    include /etc/nginx/snippets/ssl.conf;

    # ── Güvenlik başlıkları ───────────────────────────────────────────────────
    include /etc/nginx/snippets/security-headers.conf;

    # ── Saldırı engelleme ─────────────────────────────────────────────────────
    include /etc/nginx/snippets/block-rules.conf;

    # ── Genel bağlantı limiti ─────────────────────────────────────────────────
    limit_conn conn_limit 20;         # IP başına eş zamanlı max 20 bağlantı
    limit_conn server_conn 2000;      # Sunucu geneli max 2000 eş zamanlı bağlantı
    limit_req  zone=general burst=30 nodelay;

    # ── Güvenlik loglama ──────────────────────────────────────────────────────
    access_log /var/log/nginx/cem.pw.access.log  main;
    error_log  /var/log/nginx/cem.pw.error.log   warn;

    ##########################################################################
    # ROTALAR
    ##########################################################################

    # ── /install → install.sh (macOS & Linux curl komutu) ────────────────────
    # curl -fsSL cem.pw/install | sh
    location = /install {
        # Sadece script indirme için özel rate limit
        limit_req zone=download burst=3 nodelay;

        # install.sh dosyasını sun
        alias /var/www/cem.pw/scripts/install.sh;

        # Shell script için doğru MIME type
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Content-Disposition "inline";

        # Cache: script sık değişir, agresif cache istemiyoruz
        add_header Cache-Control "no-cache, max-age=300";

        # Güvenlik başlıkları (install script için CSP farklı)
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # curl, wget, PowerShell'e izin ver (block-rules'daki bad_bot listesinden muaf)
        # Not: Gerçek kullanıcı UA'ları için bad_bot kontrolü zaten yok bu location'da
        access_log /var/log/nginx/cem.pw.downloads.log security;
    }

    # ── /install.ps1 → Windows PowerShell scripti ─────────────────────────────
    # irm cem.pw/install.ps1 | iex
    location = /install.ps1 {
        limit_req zone=download burst=3 nodelay;

        alias /var/www/cem.pw/scripts/install.ps1;

        add_header Content-Type "text/plain; charset=utf-8";
        add_header Content-Disposition "inline";
        add_header Cache-Control "no-cache, max-age=300";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        access_log /var/log/nginx/cem.pw.downloads.log security;
    }

    # ── /uninstall → uninstall.sh (macOS & Linux) ────────────────────────────
    # curl -fsSL cem.pw/uninstall | sh
    location = /uninstall {
        limit_req zone=download burst=3 nodelay;

        alias /var/www/cem.pw/scripts/uninstall.sh;

        add_header Content-Type "text/plain; charset=utf-8";
        add_header Content-Disposition "inline";
        add_header Cache-Control "no-cache, max-age=300";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        access_log /var/log/nginx/cem.pw.downloads.log security;
    }

    # ── /uninstall.ps1 → Windows PowerShell kaldırma ─────────────────────────
    # irm cem.pw/uninstall.ps1 | iex
    location = /uninstall.ps1 {
        limit_req zone=download burst=3 nodelay;

        alias /var/www/cem.pw/scripts/uninstall.ps1;

        add_header Content-Type "text/plain; charset=utf-8";
        add_header Content-Disposition "inline";
        add_header Cache-Control "no-cache, max-age=300";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        access_log /var/log/nginx/cem.pw.downloads.log security;
    }

    # ── /r/* → GitLab Releases proxy ──────────────────────────────────────────
    # cem.pw/r/cem-linux-amd64 → gitlab.makdos.biz/.../releases/permalink/latest/downloads/cem-linux-amd64
    # Canonical repo gitlab; .gitlab-ci.yml release stage tüm binary'leri
    # release asset link olarak ekler.
    location ^~ /r/ {
        limit_req zone=download burst=5 nodelay;
        limit_conn conn_limit 5;

        # GitLab Releases'e proxy et (permalink/latest 13.9+)
        proxy_pass https://gitlab.makdos.biz/makdos/cem/-/releases/permalink/latest/downloads/;

        proxy_ssl_server_name on;
        proxy_ssl_protocols   TLSv1.2 TLSv1.3;

        proxy_set_header Host               "gitlab.makdos.biz";
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Binary indirme için geniş timeout
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;

        # Buffer: büyük binary dosyaları için
        proxy_buffering      on;
        proxy_buffer_size    128k;
        proxy_buffers        8 256k;

        # Cache: release binary'leri değişmez
        add_header Cache-Control "public, max-age=86400, immutable";
        add_header X-Proxy-Cache $upstream_cache_status;

        access_log /var/log/nginx/cem.pw.downloads.log security;
    }

    # ── /docs/* → Dokümantasyon (static site) ────────────────────────────────
    location ^~ /docs {
        alias /var/www/cem.pw/docs;
        try_files $uri $uri/ $uri.html /docs/index.html;

        # Docs için cache
        add_header Cache-Control "public, max-age=3600";

        # Docs'ta CSP biraz daha esnek
        add_header Content-Security-Policy
            "default-src 'self';
             script-src  'self' 'unsafe-inline';
             style-src   'self' 'unsafe-inline';
             img-src     'self' data: https:;
             font-src    'self';"
            always;
    }

    # ── / → Ana sayfa (static) ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;

        # Static asset cache (CSS, JS, görseller)
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            add_header Vary "Accept-Encoding";
            access_log off;
        }
    }

    # ── Robots.txt ────────────────────────────────────────────────────────────
    location = /robots.txt {
        add_header Content-Type "text/plain";
        return 200 "User-agent: *\nDisallow: /r/\nAllow: /\n";
    }

    # ── Favicon ───────────────────────────────────────────────────────────────
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 7d;
    }

    # ── Health check (uptime izleme için) ────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type "application/json";
        return 200 '{"status":"ok","service":"cem.pw"}';
    }

    # ── 404 sayfası ───────────────────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        root /var/www/cem.pw/public;
        internal;
    }

    # ── Rate limit aşıldığında ────────────────────────────────────────────────
    error_page 429 /429.html;
    location = /429.html {
        root /var/www/cem.pw/public;
        internal;
        add_header Retry-After 60;
    }
}
