##############################################################################
# /etc/nginx/nginx.conf
# cem.pw — Ana Nginx Yapılandırması
##############################################################################

user  nginx;
worker_processes auto;                    # CPU çekirdek sayısına göre otomatik
worker_rlimit_nofile 65535;              # Her worker için max açık dosya

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;            # Worker başına max bağlantı
    use epoll;                           # Linux için en verimli event model
    multi_accept on;                     # Aynı anda birden fazla bağlantı kabul et
}

http {
    ##########################################################################
    # TEMEL AYARLAR
    ##########################################################################

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    charset utf-8;

    sendfile        on;
    tcp_nopush      on;                  # Paketleri birleştir, ağ verimliliği
    tcp_nodelay     on;                  # Keep-alive bağlantılarında gecikmeyi azalt
    keepalive_timeout 30s;              # Uzun keep-alive = kaynak tüketimi
    keepalive_requests 100;
    reset_timedout_connection on;

    ##########################################################################
    # GİZLİLİK — Nginx versiyonunu gizle
    ##########################################################################

    server_tokens off;                   # "nginx/1.x.x" bilgisini gizle
    more_clear_headers Server;           # Server header'ı tamamen kaldır (headers_more modülü)

    ##########################################################################
    # LOG FORMATI — Güvenlik analizi için zengin log
    ##########################################################################

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time '
                    '"$http_x_forwarded_for" "$ssl_protocol" "$ssl_cipher"';

    log_format security '$time_iso8601 $remote_addr '
                        '"$request_method $request_uri" $status '
                        '"$http_user_agent" "$http_referer" '
                        'rt=$request_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    ##########################################################################
    # BUFFER / TIMEOUT — Slowloris ve buffer overflow koruması
    ##########################################################################

    # İstek gövdesi
    client_body_buffer_size     16k;
    client_max_body_size        10m;     # Max upload boyutu
    client_body_timeout         10s;    # Body okuma timeout (Slowloris)
    client_header_timeout       10s;    # Header okuma timeout
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;   # Büyük cookie/header için

    # Yanıt
    send_timeout                10s;    # Yanıt gönderme timeout

    # Proxy buffer
    proxy_buffer_size           4k;
    proxy_buffers               8 4k;
    proxy_busy_buffers_size     8k;
    proxy_connect_timeout       5s;
    proxy_read_timeout          30s;
    proxy_send_timeout          10s;

    ##########################################################################
    # SIKIŞTIRMA
    ##########################################################################

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-sh application/octet-stream
        image/svg+xml;

    ##########################################################################
    # RATE LIMITING — DDoS / Brute-force koruması
    ##########################################################################

    # Genel rate limit: IP başına 20 istek/saniye
    limit_req_zone $binary_remote_addr zone=general:20m   rate=20r/s;
    # Install script indirme: IP başına 5 istek/dakika
    limit_req_zone $binary_remote_addr zone=download:20m  rate=5r/m;
    # API (gelecek): IP başına 10 istek/saniye
    limit_req_zone $binary_remote_addr zone=api:10m       rate=10r/s;
    # Tüm site için agresif limit (DDoS)
    limit_req_zone $binary_remote_addr zone=strict:10m    rate=2r/s;

    # Eş zamanlı bağlantı limiti
    limit_conn_zone $binary_remote_addr zone=conn_limit:20m;
    limit_conn_zone $server_name        zone=server_conn:10m;

    limit_req_status  429;
    limit_conn_status 429;

    ##########################################################################
    # GEO BLOKLAMA — (Opsiyonel, GeoIP2 modülü gerekir)
    ##########################################################################
    # geoip2 /etc/nginx/geoip/GeoLite2-Country.mmdb {
    #     $geoip2_data_country_code country iso_code;
    # }
    # map $geoip2_data_country_code $blocked_country {
    #     default 0;
    #     CN 1;   # Ülke bazlı blok (isteğe göre)
    # }

    ##########################################################################
    # KÖTÜ USER-AGENT FİLTRESİ
    ##########################################################################

    map $http_user_agent $bad_bot {
        default                          0;
        ""                               1;   # Boş UA
        "~*masscan"                      1;
        "~*nikto"                        1;
        "~*sqlmap"                       1;
        "~*nmap"                         1;
        "~*nessus"                       1;
        "~*openvas"                      1;
        "~*zgrab"                        1;
        "~*go-http-client/1\."           1;   # Ham Go HTTP (tarayıcılar)
        "~*python-requests"              1;   # Ham Python requests
        "~*libwww-perl"                  1;
        "~*curl/[0-6]\."                 1;   # Eski curl versiyonları
        "~*wp-scan"                      1;
        "~*dirbuster"                    1;
        "~*nuclei"                       1;
        "~*acunetix"                     1;
        "~*burpsuite"                    1;
    }

    # curl ile install izin ver (cem.pw/install için ayrı location)
    map $http_user_agent $is_curl {
        default        0;
        "~*^curl/"     1;
    }

    ##########################################################################
    # REFERRER SPAMİ ENGELLEMEsi
    ##########################################################################

    map $http_referer $bad_referer {
        default 0;
        "~*semalt"  1;
        "~*best-seo" 1;
        "~*buttons-for-website" 1;
    }

    ##########################################################################
    # HTTPS ZORLAMA — HTTP → HTTPS yönlendirme
    ##########################################################################

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ACME challenge (Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Her şeyi HTTPS'e yönlendir
        location / {
            return 301 https://$host$request_uri;
        }
    }

    ##########################################################################
    # VİRTÜEL HOST YAPILARI
    ##########################################################################

    include /etc/nginx/sites-enabled/*.conf;
    include /etc/nginx/conf.d/*.conf;
}
