##############################################################################
# /etc/nginx/snippets/ssl.conf
# Güçlü TLS Yapılandırması — SSLLabs A+ hedefi
##############################################################################

# Sertifikalar (Let's Encrypt - Certbot tarafından doldurulur)
ssl_certificate     /etc/letsencrypt/live/cem.pw/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/cem.pw/privkey.pem;

# Güvenilir CA zinciri (OCSP Stapling için)
ssl_trusted_certificate /etc/letsencrypt/live/cem.pw/chain.pem;

# ── Protokol ─────────────────────────────────────────────────────────────────
# TLS 1.0 ve 1.1 KAPALI — sadece 1.2 ve 1.3
ssl_protocols TLSv1.2 TLSv1.3;

# ── Cipher Suites ─────────────────────────────────────────────────────────────
# TLS 1.3 ciphers otomatik (güçlü, değiştirilemez)
# TLS 1.2 için güçlü cipher listesi:
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:'
            'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:'
            'ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:'
            'DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

# Sunucu cipher sırasını tercih et (client'ın değil)
ssl_prefer_server_ciphers off;          # TLS 1.3'te zaten geçersiz, 1.2 için off = daha modern

# ── Session ──────────────────────────────────────────────────────────────────
ssl_session_timeout 1d;
ssl_session_cache   shared:SSL:50m;     # 50MB ≈ 200.000 session
ssl_session_tickets off;                # Session ticket = forward secrecy riski, kapat

# ── OCSP Stapling ─────────────────────────────────────────────────────────────
# Browser'ın ayrıca CA'ya sormadan sertifika iptal kontrolü
ssl_stapling        on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 [2606:4700:4700::1111] valid=300s ipv6=on;
resolver_timeout 5s;

# ── DH Parametreleri ─────────────────────────────────────────────────────────
# Oluşturmak için: openssl dhparam -out /etc/nginx/dhparam.pem 4096
ssl_dhparam /etc/nginx/dhparam.pem;

# ── Early Data (0-RTT) ────────────────────────────────────────────────────────
# Replay saldırısı riski nedeniyle kapalı
ssl_early_data off;
