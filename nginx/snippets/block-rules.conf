##############################################################################
# /etc/nginx/snippets/block-rules.conf
# Saldırı İmzası ve Kötü İstek Engelleme
##############################################################################

# ── Kötü bot engelle ──────────────────────────────────────────────────────────
# nginx.conf'daki $bad_bot map'i kullanır
if ($bad_bot = 1) {
    return 444;           # Bağlantıyı sessizce kes (RST), 403 bile verme
}

# ── Boş veya geçersiz HTTP method engelle ─────────────────────────────────────
if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS|PATCH)$) {
    return 405;
}

# ── Script injection denemeleri ───────────────────────────────────────────────
# URL'de <script>, javascript:, data: vb. içerenleri engelle
if ($request_uri ~* "(<script|javascript:|vbscript:|data:text/html|%3cscript)") {
    return 400;
}

# ── Path Traversal ────────────────────────────────────────────────────────────
if ($request_uri ~* "\.\./|%2e%2e%2f|%252e%252e") {
    return 400;
}

# ── SQL Injection denemeleri ──────────────────────────────────────────────────
if ($args ~* "(union\s+select|select\s+.*\s+from|insert\s+into|drop\s+table|';\s*--|xp_cmdshell)") {
    return 400;
}

# ── Yaygın tarayıcı/exploit hedefleri ────────────────────────────────────────
# WordPress, PHP, yaygın exploit yollarını engelle
location ~* ^/(wp-admin|wp-login|wp-config|xmlrpc|phpmyadmin|pma|
              \.env|\.git|\.svn|\.htaccess|\.htpasswd|
              config\.php|database\.yml|credentials|
              admin/config|shell|cmd|eval|exec|
              actuator|solr|jenkins|jmx-console) {
    return 404;   # Var olmadığını ima et, saldırganı bilgilendirme
}

# ── Gizli dosyalara erişimi engelle ──────────────────────────────────────────
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
}

# ── Backup ve temp dosya erişimini engelle ───────────────────────────────────
location ~* \.(bak|backup|sql|tar|gz|zip|log|old|orig|tmp|swp|~)$ {
    deny all;
    return 404;
}
