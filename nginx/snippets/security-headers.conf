##############################################################################
# /etc/nginx/snippets/security-headers.conf
# HTTP Güvenlik Başlıkları
##############################################################################

# ── HSTS ──────────────────────────────────────────────────────────────────────
# 2 yıl boyunca sadece HTTPS, subdomain dahil, preload listesine gönder
# ⚠ İlk kez test etmeden max-age'i küçük tut (örn: 300), sonra artır
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ── Clickjacking ──────────────────────────────────────────────────────────────
# Sayfayı iframe içine almayı engelle
add_header X-Frame-Options "DENY" always;

# ── MIME Sniffing ─────────────────────────────────────────────────────────────
# Browser'ın Content-Type'ı tahmin etmesini engelle
add_header X-Content-Type-Options "nosniff" always;

# ── XSS Koruması ─────────────────────────────────────────────────────────────
# Eski tarayıcılar için (modern tarayıcılarda CSP daha etkili)
add_header X-XSS-Protection "1; mode=block" always;

# ── Content Security Policy ───────────────────────────────────────────────────
# Sadece kendi kaynaktan script/style/font yükle
add_header Content-Security-Policy
    "default-src 'self';
     script-src  'self' 'unsafe-inline';
     style-src   'self' 'unsafe-inline';
     img-src     'self' data: https:;
     font-src    'self';
     connect-src 'self' https://api.github.com;
     frame-src   'none';
     object-src  'none';
     base-uri    'self';
     form-action 'self';
     upgrade-insecure-requests;"
    always;

# ── Referrer Policy ───────────────────────────────────────────────────────────
# Dış sitelere referrer bilgisi gönderme
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Permissions Policy ────────────────────────────────────────────────────────
# Kamera, mikrofon, konum vb. API'leri kapat
add_header Permissions-Policy
    "accelerometer=(),
     ambient-light-sensor=(),
     autoplay=(),
     battery=(),
     camera=(),
     cross-origin-isolated=(),
     display-capture=(),
     encrypted-media=(),
     execution-while-not-rendered=(),
     execution-while-out-of-viewport=(),
     fullscreen=(self),
     geolocation=(),
     gyroscope=(),
     keyboard-map=(),
     magnetometer=(),
     microphone=(),
     midi=(),
     navigation-override=(),
     payment=(),
     picture-in-picture=(),
     publickey-credentials-get=(),
     screen-wake-lock=(),
     sync-xhr=(),
     usb=(),
     web-share=(),
     xr-spatial-tracking=()"
    always;

# ── Cross-Origin Policies ─────────────────────────────────────────────────────
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Opener-Policy   "same-origin"  always;
add_header Cross-Origin-Resource-Policy "same-origin"  always;

# ── Cache Control ─────────────────────────────────────────────────────────────
# Hassas sayfalar cache'lenmemeli (genel; install script için ayrı ayar var)
add_header Cache-Control "no-store, no-cache, must-revalidate" always;
add_header Pragma "no-cache" always;
